---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# Hubelia managed client image (Aurora-based). Publishes to
# ghcr.io/<repo-owner>/hub-client-image
name: hub-client-image
description: Hubelia managed client (Aurora DX base)
base-image: ghcr.io/ublue-os/aurora-dx
image-version: stable

modules:
  # System packages layered onto the base (not shipped in stock Aurora)
  - type: rpm-ostree
    install:
      - syncthing        # file sync to the VPS
      - kio-extras       # enables sftp:// browsing in Dolphin
    # --- BAZAAR REMOVAL (if it's an rpm) ---
    # If  rpm -qa | grep -i bazaar  returns a package, uncomment and set the name:
    remove:
      - krunner-bazaar

  # Default apps, installed system-wide (available to every account, admin-managed)
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          # Editors / dev
          - dev.zed.Zed
          - io.dbeaver.DBeaverCommunity      # connects to VPS DBs via its SSH tunnel
          - io.podman_desktop.PodmanDesktop  # add a remote SSH connection to VPS podman
          - io.github.shiftey.Desktop        # GitHub Desktop (community build)
          # Comms
          - us.zoom.Zoom
          - com.slack.Slack
          - org.signal.Signal
          - com.github.IsmaelMartinez.teams_for_linux   # "Portal for Teams"
          # Browsers
          - org.mozilla.firefox
          - com.brave.Browser
          - com.google.Chrome
          # Mail / office / notes / diagrams
          - org.mozilla.Thunderbird
          - org.onlyoffice.desktopeditors
          - md.obsidian.Obsidian
          - com.jgraph.drawio.desktop
          # AI (points at your GPU box's Ollama)
          - com.jeffser.Alpaca
          # Media / utilities
          - com.obsproject.Studio
          - org.flameshot.Flameshot
          - org.videolan.VLC
      # --- BAZAAR REMOVAL (if it's a flatpak) ---
      # If  flatpak list | grep -i bazaar  returns it, uncomment:
        remove:
          - io.github.kolunmi.Bazaar

  # Copy the baked-in config files (everything under files/system -> /)
  - type: files
    files:
      - source: system
        destination: /

  # Post-copy fixups (run after the files module):
  #  - create ~/work subfolders in /etc/skel
  #  - tighten skel .ssh permissions (files module resets them)
  #  - bake the VS Code Remote-SSH extension into skel so new users have it
  #    (non-fatal: if it fails at build, users install it on first use)
  - type: script
    snippets:
      - "mkdir -p /etc/skel/work/Desktop /etc/skel/work/Downloads /etc/skel/work/Documents /etc/skel/work/Music /etc/skel/work/Pictures /etc/skel/work/Videos /etc/skel/work/Templates /etc/skel/work/Public"
      - "chmod 700 /etc/skel/.ssh && chmod 600 /etc/skel/.ssh/config"
      - "code --install-extension ms-vscode-remote.remote-ssh --extensions-dir /etc/skel/.vscode/extensions || echo 'WARN: remote-ssh bake failed; will install on first use'"

  # Enable the Tailscale daemon at boot (auth 'tailscale up' is a first-login step)
  - type: systemd
    system:
      enabled:
        - tailscaled.service

  # Set up image signature verification (uses your cosign.pub)
  - type: signing
